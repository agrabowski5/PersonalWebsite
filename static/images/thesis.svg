<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#1a1a2e"/>
  <!-- Game theory: two players with strategy arrows -->
  <!-- Player circles -->
  <circle cx="120" cy="100" r="30" fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.7"/>
  <circle cx="280" cy="100" r="30" fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.7"/>
  <text x="120" y="105" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="11" opacity="0.8">Buyer A</text>
  <text x="280" y="105" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="11" opacity="0.8">Buyer B</text>
  <!-- Collaboration arrows -->
  <path d="M152,90 Q200,60 248,90" fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.5" marker-end="url(#arrow)"/>
  <path d="M248,110 Q200,140 152,110" fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#2ecc71" opacity="0.5"/>
    </marker>
  </defs>
  <!-- Central mechanism -->
  <rect x="175" y="85" width="50" height="30" rx="4" fill="#27ae60" opacity="0.3" stroke="#2ecc71" stroke-width="1"/>
  <text x="200" y="104" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="9" opacity="0.8">VCG</text>
  <!-- Emission tracking below -->
  <g transform="translate(100,170)" opacity="0.5">
    <rect x="0" y="0" width="200" height="8" rx="4" fill="#1e3a2f" stroke="#2ecc71" stroke-width="0.5"/>
    <rect x="0" y="0" width="130" height="8" rx="4" fill="#2ecc71" opacity="0.4"/>
    <text x="210" y="8" fill="#a8e4bc" font-family="system-ui" font-size="9">Scope 3</text>
  </g>
  <g transform="translate(100,185)" opacity="0.4">
    <rect x="0" y="0" width="200" height="8" rx="4" fill="#1e3a2f" stroke="#2ecc71" stroke-width="0.5"/>
    <rect x="0" y="0" width="80" height="8" rx="4" fill="#27ae60" opacity="0.4"/>
    <text x="210" y="8" fill="#a8e4bc" font-family="system-ui" font-size="9">Scope 2</text>
  </g>
  <text x="200" y="228" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="12" font-weight="600" opacity="0.7">Collaborative Purchasing - Thesis</text>
</svg>
