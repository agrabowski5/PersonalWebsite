<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#1a1a2e"/>
  <!-- Grid lines -->
  <g stroke="#2ecc71" stroke-width="0.5" opacity="0.2">
    <line x1="40" y1="40" x2="40" y2="200"/><line x1="80" y1="40" x2="80" y2="200"/>
    <line x1="120" y1="40" x2="120" y2="200"/><line x1="160" y1="40" x2="160" y2="200"/>
    <line x1="200" y1="40" x2="200" y2="200"/><line x1="240" y1="40" x2="240" y2="200"/>
    <line x1="280" y1="40" x2="280" y2="200"/><line x1="320" y1="40" x2="320" y2="200"/>
    <line x1="360" y1="40" x2="360" y2="200"/>
    <line x1="40" y1="60" x2="360" y2="60"/><line x1="40" y1="100" x2="360" y2="100"/>
    <line x1="40" y1="140" x2="360" y2="140"/><line x1="40" y1="180" x2="360" y2="180"/>
  </g>
  <!-- Transmission lines -->
  <g stroke="#2ecc71" stroke-width="2" opacity="0.6">
    <line x1="100" y1="80" x2="200" y2="120"/>
    <line x1="200" y1="120" x2="300" y2="90"/>
    <line x1="200" y1="120" x2="180" y2="170"/>
    <line x1="300" y1="90" x2="320" y2="160"/>
    <line x1="180" y1="170" x2="320" y2="160"/>
    <line x1="100" y1="80" x2="80" y2="150"/>
    <line x1="80" y1="150" x2="180" y2="170"/>
  </g>
  <!-- Nodes -->
  <circle cx="100" cy="80" r="8" fill="#2ecc71"/>
  <circle cx="200" cy="120" r="10" fill="#27ae60"/>
  <circle cx="300" cy="90" r="8" fill="#2ecc71"/>
  <circle cx="180" cy="170" r="7" fill="#2ecc71"/>
  <circle cx="320" cy="160" r="7" fill="#2ecc71"/>
  <circle cx="80" cy="150" r="6" fill="#2ecc71" opacity="0.8"/>
  <!-- Wind turbine icon -->
  <g transform="translate(100,80)" opacity="0.9">
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="-18" x2="8" y2="-10" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="-18" x2="-8" y2="-10" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="-18" x2="0" y2="-6" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- Solar icon -->
  <g transform="translate(300,90)" opacity="0.9">
    <circle cx="0" cy="-14" r="5" fill="none" stroke="#f1c40f" stroke-width="1.5"/>
    <g stroke="#f1c40f" stroke-width="1">
      <line x1="0" y1="-22" x2="0" y2="-20"/><line x1="0" y1="-8" x2="0" y2="-6"/>
      <line x1="-6" y1="-14" x2="-8" y2="-14"/><line x1="6" y1="-14" x2="8" y2="-14"/>
    </g>
  </g>
  <text x="200" y="225" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="14" font-weight="600" opacity="0.8">CANOPI Grid Platform</text>
</svg>
