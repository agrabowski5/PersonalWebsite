<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#1a1a2e"/>
  <!-- Queue visualization - stacked bars representing queue positions -->
  <g opacity="0.7">
    <rect x="50" y="50" width="300" height="20" rx="3" fill="#1e3a2f" stroke="#2ecc71" stroke-width="1"/>
    <rect x="50" y="80" width="300" height="20" rx="3" fill="#1e3a2f" stroke="#2ecc71" stroke-width="1"/>
    <rect x="50" y="110" width="300" height="20" rx="3" fill="#1e3a2f" stroke="#2ecc71" stroke-width="1"/>
    <rect x="50" y="140" width="300" height="20" rx="3" fill="#1e3a2f" stroke="#2ecc71" stroke-width="1"/>
  </g>
  <!-- Fill bars (varying progress) -->
  <rect x="50" y="50" width="260" height="20" rx="3" fill="#2ecc71" opacity="0.5"/>
  <rect x="50" y="80" width="180" height="20" rx="3" fill="#2ecc71" opacity="0.4"/>
  <rect x="50" y="110" width="120" height="20" rx="3" fill="#27ae60" opacity="0.4"/>
  <rect x="50" y="140" width="70" height="20" rx="3" fill="#27ae60" opacity="0.3"/>
  <!-- Queue labels -->
  <g fill="white" font-family="system-ui" font-size="10" opacity="0.7">
    <text x="60" y="64">Solar Farm - 200MW</text>
    <text x="60" y="94">Wind Project - 150MW</text>
    <text x="60" y="124">Battery Storage - 80MW</text>
    <text x="60" y="154">Solar + Storage</text>
  </g>
  <!-- Game theory payoff matrix hint -->
  <g transform="translate(240,175)" opacity="0.5">
    <rect x="0" y="0" width="50" height="25" fill="none" stroke="#2ecc71" stroke-width="1"/>
    <rect x="50" y="0" width="50" height="25" fill="none" stroke="#2ecc71" stroke-width="1"/>
    <rect x="0" y="25" width="50" height="25" fill="none" stroke="#2ecc71" stroke-width="1"/>
    <rect x="50" y="25" width="50" height="25" fill="none" stroke="#2ecc71" stroke-width="1"/>
    <text x="25" y="16" fill="#2ecc71" font-family="system-ui" font-size="9" text-anchor="middle">3,2</text>
    <text x="75" y="16" fill="#2ecc71" font-family="system-ui" font-size="9" text-anchor="middle">1,4</text>
    <text x="25" y="41" fill="#2ecc71" font-family="system-ui" font-size="9" text-anchor="middle">4,1</text>
    <text x="75" y="41" fill="#2ecc71" font-family="system-ui" font-size="9" text-anchor="middle">2,3</text>
  </g>
  <text x="200" y="230" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="11" opacity="0.6">Interconnection Queue Simulation</text>
</svg>
