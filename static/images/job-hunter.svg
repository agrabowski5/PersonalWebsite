<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#1a1a2e"/>
  <!-- Search/radar sweep -->
  <circle cx="200" cy="110" r="70" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="110" r="50" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.25"/>
  <circle cx="200" cy="110" r="30" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.2"/>
  <!-- Radar sweep -->
  <path d="M200,110 L200,40 A70,70 0 0,1 260,75Z" fill="#2ecc71" opacity="0.15"/>
  <!-- Blips (job matches) -->
  <circle cx="220" cy="75" r="4" fill="#2ecc71" opacity="0.8"/>
  <circle cx="170" cy="90" r="3" fill="#2ecc71" opacity="0.6"/>
  <circle cx="240" cy="120" r="3" fill="#2ecc71" opacity="0.5"/>
  <circle cx="185" cy="140" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="155" cy="115" r="3" fill="#2ecc71" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="200" cy="110" r="4" fill="#2ecc71"/>
  <!-- Email icon bottom right -->
  <g transform="translate(310,170)" opacity="0.5">
    <rect x="0" y="0" width="40" height="28" rx="3" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
    <polyline points="0,0 20,14 40,0" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
  </g>
  <!-- Arrow from radar to email -->
  <path d="M250,140 Q280,155 305,172" fill="none" stroke="#2ecc71" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="200" y="225" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="13" font-weight="600" opacity="0.8">Climate Job Scanner</text>
</svg>
