<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#1a1a2e"/>
  <!-- Tree structure -->
  <g stroke="#2ecc71" stroke-width="2" opacity="0.6">
    <!-- Root to level 1 -->
    <line x1="200" y1="40" x2="100" y2="90"/>
    <line x1="200" y1="40" x2="300" y2="90"/>
    <!-- Level 1 to level 2 -->
    <line x1="100" y1="90" x2="60" y2="140"/>
    <line x1="100" y1="90" x2="140" y2="140"/>
    <line x1="300" y1="90" x2="260" y2="140"/>
    <line x1="300" y1="90" x2="340" y2="140"/>
    <!-- Level 2 to level 3 -->
    <line x1="60" y1="140" x2="45" y2="185"/>
    <line x1="60" y1="140" x2="75" y2="185"/>
    <line x1="140" y1="140" x2="125" y2="185"/>
    <line x1="140" y1="140" x2="155" y2="185"/>
    <line x1="260" y1="140" x2="245" y2="185"/>
    <line x1="260" y1="140" x2="275" y2="185"/>
    <line x1="340" y1="140" x2="340" y2="185"/>
  </g>
  <!-- Nodes -->
  <circle cx="200" cy="40" r="10" fill="#2ecc71"/>
  <circle cx="100" cy="90" r="8" fill="#27ae60"/>
  <circle cx="300" cy="90" r="8" fill="#27ae60"/>
  <circle cx="60" cy="140" r="6" fill="#2ecc71" opacity="0.8"/>
  <circle cx="140" cy="140" r="6" fill="#2ecc71" opacity="0.8"/>
  <circle cx="260" cy="140" r="6" fill="#2ecc71" opacity="0.8"/>
  <circle cx="340" cy="140" r="6" fill="#2ecc71" opacity="0.8"/>
  <g fill="#2ecc71" opacity="0.6">
    <circle cx="45" cy="185" r="4"/><circle cx="75" cy="185" r="4"/>
    <circle cx="125" cy="185" r="4"/><circle cx="155" cy="185" r="4"/>
    <circle cx="245" cy="185" r="4"/><circle cx="275" cy="185" r="4"/>
    <circle cx="340" cy="185" r="4"/>
  </g>
  <!-- Database icons -->
  <g transform="translate(185, 210)" opacity="0.5">
    <text fill="#2ecc71" font-family="system-ui" font-size="10" text-anchor="middle">Ecoinvent | USLCI | GABI</text>
  </g>
</svg>
