<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
    <rect width="400" height="240" fill="#1a1a2e"/>
    <!-- D20 die centered -->
    <g transform="translate(200,115) scale(1.8)">
        <polygon points="0,-48 43,-23 43,27 0,48 -43,27 -43,-23" fill="#1a1a2e" stroke="#d4a017" stroke-width="3"/>
        <polygon points="0,-38 32,-20 32,20 0,38 -32,20 -32,-20" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.6"/>
        <line x1="0" y1="-48" x2="0" y2="-38" stroke="#d4a017" stroke-width="1.5" opacity="0.6"/>
        <line x1="43" y1="-23" x2="32" y2="-20" stroke="#d4a017" stroke-width="1.5" opacity="0.6"/>
        <line x1="43" y1="27" x2="32" y2="20" stroke="#d4a017" stroke-width="1.5" opacity="0.6"/>
        <line x1="0" y1="48" x2="0" y2="38" stroke="#d4a017" stroke-width="1.5" opacity="0.6"/>
        <line x1="-43" y1="27" x2="-32" y2="20" stroke="#d4a017" stroke-width="1.5" opacity="0.6"/>
