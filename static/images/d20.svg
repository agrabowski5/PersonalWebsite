        <circle cx="60" cy="65" r="3"/><circle cx="75" cy="65" r="3"/>
        <circle cx="330" cy="170" r="3"/><circle cx="345" cy="170" r="3"/>
        <circle cx="330" cy="185" r="3"/><circle cx="345" cy="185" r="3"/>
        <circle cx="337" cy="200" r="3"/>
