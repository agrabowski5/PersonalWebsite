<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#1a1a2e"/>
  <!-- Gavel -->
  <g transform="translate(200,100)">
    <rect x="-60" y="20" width="120" height="12" rx="3" fill="#27ae60" transform="rotate(-15)"/>
    <rect x="40" y="-10" width="35" height="50" rx="5" fill="#2ecc71" transform="rotate(-15)"/>
    <!-- Base -->
    <ellipse cx="0" cy="60" rx="50" ry="10" fill="#2ecc71" opacity="0.5"/>
    <rect x="-8" y="40" width="16" height="22" rx="2" fill="#27ae60"/>
  </g>
  <!-- Rising bid bars -->
  <g opacity="0.4">
    <rect x="40" y="160" width="25" height="40" rx="2" fill="#2ecc71"/>
    <rect x="75" y="140" width="25" height="60" rx="2" fill="#2ecc71"/>
    <rect x="110" y="115" width="25" height="85" rx="2" fill="#2ecc71"/>
    <rect x="145" y="100" width="25" height="100" rx="2" fill="#27ae60"/>
  </g>
  <!-- Airplane silhouette -->
  <g transform="translate(310,60) scale(0.8)" fill="#2ecc71" opacity="0.6">
    <path d="M0,0 L-15,-5 L-40,0 L-15,0 L-20,10 L-12,8 L-8,0 L5,2 Z"/>
  </g>
  <text x="200" y="225" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="14" font-weight="600" opacity="0.8">SAF Auction System</text>
</svg>
