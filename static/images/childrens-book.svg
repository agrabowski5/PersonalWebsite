<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#1a1a2e"/>
  <!-- Open book -->
  <g transform="translate(200,130)">
    <!-- Left page -->
    <path d="M-10,30 Q-10,-50 -100,-40 L-100,40 Q-10,30 -10,30Z" fill="#2a2a3e" stroke="#2ecc71" stroke-width="1.5" opacity="0.8"/>
    <!-- Right page -->
    <path d="M10,30 Q10,-50 100,-40 L100,40 Q10,30 10,30Z" fill="#2a2a3e" stroke="#2ecc71" stroke-width="1.5" opacity="0.8"/>
    <!-- Spine -->
    <line x1="0" y1="-50" x2="0" y2="32" stroke="#2ecc71" stroke-width="2" opacity="0.6"/>
    <!-- Text lines on left page -->
    <g opacity="0.3" stroke="#a8e4bc" stroke-width="1.5">
      <line x1="-85" y1="-25" x2="-25" y2="-25"/>
      <line x1="-85" y1="-15" x2="-30" y2="-15"/>
      <line x1="-85" y1="-5" x2="-20" y2="-5"/>
      <line x1="-85" y1="5" x2="-35" y2="5"/>
    </g>
  </g>
  <!-- Airplane flying above book -->
  <g transform="translate(260,50)" fill="#2ecc71" opacity="0.7">
    <path d="M0,0 L20,-3 L25,0 L20,3 L0,0Z"/>
    <path d="M5,-2 L10,-12 L14,-2Z"/>
    <path d="M5,2 L10,12 L14,2Z"/>
    <path d="M-2,-1 L-2,-5 L2,-1Z"/>
    <path d="M-2,1 L-2,5 L2,1Z"/>
  </g>
  <!-- Trail -->
  <g stroke="#2ecc71" stroke-width="1" stroke-dasharray="4,4" opacity="0.3">
    <path d="M150,60 Q200,45 255,52" fill="none"/>
  </g>
  <!-- Cloud -->
  <g fill="#2ecc71" opacity="0.15">
    <circle cx="120" cy="45" r="15"/><circle cx="140" cy="40" r="18"/>
    <circle cx="160" cy="45" r="14"/>
  </g>
  <text x="200" y="225" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="13" font-weight="600" opacity="0.8">Sky's Big Green Flight</text>
</svg>
