<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#1a1a2e"/>
  <!-- Upward trending chart -->
  <g opacity="0.3">
    <line x1="60" y1="190" x2="60" y2="40" stroke="#2ecc71" stroke-width="1.5"/>
    <line x1="60" y1="190" x2="350" y2="190" stroke="#2ecc71" stroke-width="1.5"/>
  </g>
  <!-- Area chart fill -->
  <path d="M60,180 Q120,170 160,150 Q200,120 240,100 Q280,70 320,50 L320,190 L60,190Z" fill="#2ecc71" opacity="0.1"/>
  <!-- Line chart -->
  <path d="M60,180 Q120,170 160,150 Q200,120 240,100 Q280,70 320,50" fill="none" stroke="#2ecc71" stroke-width="2.5" opacity="0.7"/>
  <!-- Data points -->
  <circle cx="60" cy="180" r="4" fill="#2ecc71" opacity="0.8"/>
  <circle cx="120" cy="168" r="4" fill="#2ecc71" opacity="0.8"/>
  <circle cx="160" cy="150" r="4" fill="#2ecc71" opacity="0.8"/>
  <circle cx="200" cy="125" r="4" fill="#27ae60" opacity="0.8"/>
  <circle cx="240" cy="100" r="4" fill="#2ecc71" opacity="0.8"/>
  <circle cx="280" cy="72" r="4" fill="#2ecc71" opacity="0.8"/>
  <circle cx="320" cy="50" r="5" fill="#2ecc71"/>
  <!-- Dollar/leaf combo icon -->
  <g transform="translate(320,50)" opacity="0.7">
    <text x="10" y="5" fill="#2ecc71" font-family="system-ui" font-size="18" font-weight="bold">$</text>
  </g>
  <!-- Grid lines -->
  <g stroke="#2ecc71" stroke-width="0.5" opacity="0.1" stroke-dasharray="4,4">
    <line x1="60" y1="70" x2="350" y2="70"/>
    <line x1="60" y1="110" x2="350" y2="110"/>
    <line x1="60" y1="150" x2="350" y2="150"/>
  </g>
  <text x="200" y="225" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="13" font-weight="600" opacity="0.6">IN PROGRESS</text>
</svg>
